<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaiTorcer - Orçamento Copa 2026</title>
  
  <!-- LIGAÇÃO COM O CSS -->
  <link rel="stylesheet" href="../css/vaitorcer.css">
</head>
<body>

  <header>
    <h1>VaiTorcer ✈️⚽</h1>
    <p>Seu pacote para a Copa do Mundo 2026</p>
  </header>
    <main>
        <form id="formulario">  
  <!-- 1. DADOS PESSOAIS -->
  <fieldset>
    <legend>1. Seus Dados</legend>
    <div class="campo">
      <label for="nome">Nome completo*</label>
      <input type="text" id="nome" name="nome" required>
    </div>
    <div class="campo">
      <label for="email">E-mail*</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="campo">
      <label for="telefone">Telefone*</label>
      <input type="tel" id="telefone" name="telefone" required>
    </div>
  </fieldset>

  <!-- 2,3,4,5,6. PACOTE DA COPA -->
  <fieldset>
    <legend>2. Seu Pacote Copa 2026</legend>

    <!-- 2. Cidade-sede - select com 5 opções -->
    <div class="campo">
      <label for="cidade">Cidade-sede*</label>
      <select id="cidade" name="cidade" required>
        <option value="">Selecione...</option>
        <option value="mexico">Cidade do México</option>
        <option value="ny">Nova York</option>
        <option value="la">Los Angeles</option>
        <option value="miami">Miami</option>
        <option value="toronto">Toronto</option>
      </select>
    </div>

    <!-- 3. Tipo de pacote - radio única escolha -->
    <div class="campo">
      <label>Tipo de pacote*</label>
      <div class="opcoes">
        <label><input type="radio" name="pacote" value="economico" required> Econômico</label>
        <label><input type="radio" name="pacote" value="conforto"> Conforto</label>
        <label><input type="radio" name="pacote" value="premium"> Premium</label>
      </div>
    </div>

    <!-- 4. Extras - checkbox múltipla escolha -->
    <div class="campo">
      <label>Extras</label>
      <div class="opcoes">
        <label><input type="checkbox" name="extras" value="ingresso"> Ingresso do jogo</label>
        <label><input type="checkbox" name="extras" value="seguro"> Seguro viagem</label>
        <label><input type="checkbox" name="extras" value="traslado"> Traslado</label>
      </div>
    </div>

    <!-- 5. Data de ida e volta -->
    <div class="linha">
      <div class="campo">
        <label for="ida">Data de ida*</label>
        <input type="date" id="ida" name="ida" required>
      </div>
      <div class="campo">
        <label for="volta">Data de volta*</label>
        <input type="date" id="volta" name="volta" required>
      </div>
    </div>

    <!-- 6. Observações -->
    <div class="campo">
      <label for="obs">Observações</label>
      <textarea id="obs" name="obs" rows="3" placeholder="Algum pedido especial?"></textarea>
    </div>
  </fieldset>

  <!-- 7. Botão Solicitar orçamento -->
  <button type="submit">Solicitar orçamento</button>

</form>
</main>
</body>
</html>
