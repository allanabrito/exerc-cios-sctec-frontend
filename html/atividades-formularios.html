<!DOCTYPE html>
<html>
<head>
  <title>Formulário Básico</title>
</head>
<body>
  
  <input type="text" id="nome" placeholder="Digite seu nome">
  <button id="botao">Enviar</button>
  <p id="resultado"></p>

  <script>
    // PASSO 1: Pegar os elementos do HTML e guardar em variáveis
    const campoNome = document.getElementById("nome");
    const botao = document.getElementById("botao");
    const paragrafo = document.getElementById("resultado");

    // PASSO 2: Falar pro botão ficar "ouvindo" cliques
    botao.addEventListener("click", function() {
      
      // PASSO 3: Quando clicar, pega o texto que tá no input
      const textoDigitado = campoNome.value;
      
      // PASSO 4: Joga esse texto dentro do <p> na tela
      paragrafo.textContent = textoDigitado;
      
    });
  </script>

</body>
</html>
