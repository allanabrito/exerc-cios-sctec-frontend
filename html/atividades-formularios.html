<h2>Cadastro Completo</h2>

<input type="text" id="nome" placeholder="Seu nome">
<br><br>
<input type="email" id="email" placeholder="Seu email">
<br><br>

<label>Como conheceu a gente?</label><br>
<select id="origem">
  <option value="">Selecione...</option>
  <option value="Google">Google</option>
  <option value="Instagram">Instagram</option>
  <option value="Indicacao">Indicação</option>
</select>
<br><br>

<button id="botao">Cadastrar</button>
<p id="resultado"></p>

<script>
  const campoNome = document.getElementById("nome");
  const campoEmail = document.getElementById("email");
  const campoOrigem = document.getElementById("origem");
  const botao = document.getElementById("botao");
  const paragrafo = document.getElementById("resultado");

  botao.addEventListener("click", function() {
    const nome = campoNome.value;
    const email = campoEmail.value;
    const origem = campoOrigem.value; // Pega o valor do select

    if (nome === "" || email === "" || origem === "") {
      paragrafo.textContent = "Preenche tudo, até o select!";
      paragrafo.style.color = "red";
    } 
    else if (!email.includes("@")) {
      paragrafo.textContent = "Email inválido! Falta o @";
      paragrafo.style.color = "orange";
    }
    else {
      paragrafo.textContent = "Bem-vinda, " + nome + "! Email: " + email + " | Veio por: " + origem;
      paragrafo.style.color = "green";
      campoNome.value = "";
      campoEmail.value = "";
      campoOrigem.value = ""; // Zera o select também
    }
  });
</script>
